<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>javascript object and properties</h2>
    <p id="demo"></p>
    <script>
        //create an object:
        var car = {
            engine:"VB",
            colour:"black",
            model:"2025",
            name:"mercedes"
        }
        //display some data from the object
        document.getElementById("demo").innerHTML="I HAVE A "+car.name+"with model"+car.model
    </script>
</body>
</html>
